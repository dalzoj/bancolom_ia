[scraping]
base_url = https://www.bancolombia.com/personas
max_pages = 5
max_depth = 5
respect_robots = true
delay = 0.5
output_path = .storage/data/raw/

[db]
provider = sql_lite

[sql_lite]
sql_lite_name = principal_db
sql_lite_path = .storage/db/
sql_lite_table = principal_data

[vector_db]
provider = pinecone
index = bancolomb-ia-index
dimension = 1024
metric = cosine
top_k = 5

[embedding]
provider = cohere
model = embed-multilingual-v3.0
dimension = 1024