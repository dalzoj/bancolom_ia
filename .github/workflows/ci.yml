name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias de linting
        run: pip install flake8

      - name: Ejecutar flake8
        run: flake8 backend/ frontend/ scripts/ --max-line-length=120 --ignore=E501,W503

      - name: Instalar Poetry
        run: pip install poetry==2.1.1

      - name: Instalar dependencias
        run: poetry config virtualenvs.create false && poetry install --no-root --no-interaction

      - name: Configurar PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Ejecutar tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Verificar build de Docker
        run: docker build -t bancolom-ia:latest .
